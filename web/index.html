<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Visit Tripoli – Discover places, tours, and plan your trip in Tripoli with the official explorer app.">

  <!-- SEO: Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Visit Tripoli – Explore Tripoli">
  <meta property="og:description" content="Discover places, tours, and plan your trip in Tripoli with the official explorer app.">
  <!-- Replace with your production URL for SEO and sharing -->
  <meta property="og:url" content="https://visit-tripoli.example/">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:locale" content="en">

  <!-- SEO: Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Visit Tripoli – Explore Tripoli">
  <meta name="twitter:description" content="Discover places, tours, and plan your trip in Tripoli with the official explorer app.">

  <!-- Theme (Best Practices / PWA) -->
  <meta name="theme-color" content="#0F766E">
  <meta name="color-scheme" content="light">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Visit Tripoli">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Visit Tripoli – Explore Tripoli</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect to reduce latency -->
  <link rel="preconnect" href="https://maps.googleapis.com">
  <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://maps.googleapis.com">
  <link rel="dns-prefetch" href="https://maps.gstatic.com">

  <style>
    /* Critical loading UI – inline for FCP. Explicit sizes to avoid CLS (Lighthouse). */
    .skip-link {
      position: absolute;
      top: -100px;
      left: 8px;
      z-index: 10000;
      padding: 12px 16px;
      background: #0F766E;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      text-decoration: none;
      border-radius: 8px;
      transition: top 0.2s;
    }
    .skip-link:focus {
      top: 8px;
      outline: 2px solid #0F766E;
      outline-offset: 2px;
    }
    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: #f5f5f5;
      color: #1a1a1a;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
      min-height: 100vh;
      min-height: 100dvh;
    }
    #flutter-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #0F766E;
      border-radius: 50%;
      animation: flutter-spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes flutter-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Accessibility: skip link (visible on focus) -->
  <a href="#flutter-loading" class="skip-link">Skip to main content</a>

  <!-- Visible immediately for FCP; explicit min-height prevents CLS -->
  <div id="flutter-loading" role="main" aria-live="polite" aria-label="Loading application" tabindex="-1">
    <div class="spinner" aria-hidden="true"></div>
    <span>Visit Tripoli</span>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <!-- Load Maps after page is interactive to improve Performance score -->
  <script>
    window.addEventListener('load', function () {
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyARYoNoTSJ0w-zsbbGGltkOIvUIrB99Oqs';
      s.async = true;
      document.head.appendChild(s);
    });
  </script>
</body>
</html>
